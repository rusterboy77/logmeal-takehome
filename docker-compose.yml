version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=8000
      - UPLOAD_DIR=/app/data/uploads
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./docs:/app/docs:ro
    ports:
      - "8000:8000"
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
